<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaWayra — Media Buyer Commission Reports</title>
<style>
  :root{
    --olive:#3F4021; --sage:#AEAC92; --beige:#D6D0B8; --cream:#FFF7E7;
    --amber:#E4A017; --burnt:#B34100; --brown:#623E2A; --charcoal:#2B2728;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Poppins','Segoe UI',system-ui,sans-serif;background:var(--cream);
    color:var(--charcoal);line-height:1.55;padding:48px 20px;}
  .wrap{max-width:760px;margin:0 auto;}
  header{background:var(--olive);color:var(--cream);border-radius:16px;
    padding:34px 38px;margin-bottom:26px;box-shadow:0 8px 24px rgba(63,64,33,.18);}
  .eyebrow{text-transform:uppercase;letter-spacing:.18em;font-size:.72rem;
    color:var(--amber);font-weight:600;margin-bottom:10px;}
  header h1{font-size:1.7rem;font-weight:700;line-height:1.2;}
  header .sub{margin-top:10px;color:var(--beige);font-size:.92rem;}
  .section-label{text-transform:uppercase;letter-spacing:.12em;font-size:.74rem;
    color:var(--brown);font-weight:600;margin:6px 4px 14px;}
  a.card{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--beige);
    border-radius:14px;padding:20px 22px;margin-bottom:14px;text-decoration:none;
    color:inherit;box-shadow:0 3px 10px rgba(0,0,0,.04);transition:.15s;}
  a.card:hover{background:#f7f2e3;transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.08);}
  .card-icon{font-size:1.5rem;width:46px;height:46px;flex:none;display:flex;align-items:center;
    justify-content:center;background:var(--beige);border-radius:11px;}
  .card-body{flex:1;}
  .card-title{font-weight:600;color:var(--olive);font-size:1.02rem;}
  .card-desc{font-size:.84rem;color:var(--brown);margin-top:3px;}
  .card-arrow{color:var(--amber);font-size:1.2rem;font-weight:700;}
  footer{text-align:center;color:var(--sage);font-size:.78rem;margin-top:34px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">LaWayra Retreat · Internal</div>
    <h1>Media Buyer Commission Reports</h1>
    <div class="sub">Paid-ads attribution &amp; media-buyer commission by month</div>
  </header>

  <div class="section-label">2026</div>

  <a class="card" href="may-2026-media-buying/">
    <div class="card-icon">&#128202;</div>
    <div class="card-body">
      <div class="card-title">May 2026 — Media Buying</div>
      <div class="card-desc">Andrew, Hafsa &amp; Juan · 10 attributed sales · $18,238.87 revenue · $475 payout</div>
    </div>
    <div class="card-arrow">&rarr;</div>
  </a>

  <footer>LaWayra Retreat — connect. heal. grow.</footer>
</div>
</body>
</html>
